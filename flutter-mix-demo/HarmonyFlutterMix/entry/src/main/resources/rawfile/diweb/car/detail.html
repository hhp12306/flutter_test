<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱车详情</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f0f4f8; }
    .header { background: #007AFF; color: #fff; padding: 24px 16px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .card { background: #fff; margin: 12px 16px; border-radius: 12px; padding: 16px; }
    .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .row:last-child { border: none; }
    .label { color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>我的 Model Y</h1>
    <p>续航 420km · 电量 78%</p>
  </div>
  <div class="card">
    <div class="row"><span class="label">车牌号</span><span>沪A·12345</span></div>
    <div class="row"><span class="label">总里程</span><span>12,580 km</span></div>
    <div class="row"><span class="label">下次保养</span><span>2026-08-15</span></div>
    <div class="row"><span class="label">保险到期</span><span>2026-12-01</span></div>
  </div>
  <div class="card">
    <p style="color:#666;font-size:14px;">爱车二级 H5 页面，展示车辆详细信息。</p>
  </div>
</body>
</html>
