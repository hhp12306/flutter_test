<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>服务详情</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f5f5f5; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { color: #666; font-size: 14px; line-height: 1.6; }
    .tag { display: inline-block; background: #E8F4FF; color: #007AFF; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-right: 6px; }
    button { width: 100%; padding: 14px; background: #007AFF; color: #fff; border: none; border-radius: 8px; font-size: 16px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>车主服务</h1>
    <p>
      <span class="tag">预约维保</span>
      <span class="tag">道路救援</span>
      <span class="tag">充电地图</span>
    </p>
    <p>服务二级 H5 页面。在线预约保养、查看服务进度、联系客服。</p>
    <button onclick="closePage()">完成并返回</button>
  </div>
  <script>
    function closePage() {
      if (window.DIWeb) { DIWeb.call('close'); }
    }
  </script>
</body>
</html>
